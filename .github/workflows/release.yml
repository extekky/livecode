name: Release Student Windows

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-student-windows:
    name: Build StasikShare Student.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install pyinstaller -r requirements.txt

      - name: Build student executable
        run: pyinstaller --distpath build-output --workpath build/.pyinstaller-student build/build_student.spec

      - name: Package student release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path "build-output/StasikShare Student.exe" `
            -DestinationPath "release/StasikShare-Student-Windows.zip" `
            -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: StasikShare-Student-Windows
          path: release/StasikShare-Student-Windows.zip

      - name: Attach asset to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/StasikShare-Student-Windows.zip
