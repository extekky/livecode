name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install dependencies
        run: python -m pip install pyinstaller -r requirements.txt

      - name: Build teacher binary
        run: pyinstaller build/build_teacher.spec

      - name: Build student binary
        run: pyinstaller build/build_student.spec

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp dist/liveshare-teacher release/
          cp dist/liveshare-student release/

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/liveshare-teacher.exe release/
          Copy-Item dist/liveshare-student.exe release/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liveshare-${{ runner.os }}
          path: release/*

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
